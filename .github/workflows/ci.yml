name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Biome Check (Linting & Formatting)
        run: npm run lint

      - name: Run Type Checking
        run: npm run type-check

      - name: Run Tests
        run: npm run test

      - name: Build Static Site
        run: npm run build
